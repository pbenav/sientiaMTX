name: 🚀 Deploy SientiaMTX to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: ⚡ Local Self-Hosted Deployment
    runs-on: self-hosted

    steps:
      - name: 🏁 Execute Local Deployment Commands
        run: |
          echo "🏁 Iniciando el despliegue automático local y seguro en Debian..."
          
          # Acceder al directorio del proyecto (definido de forma segura en GitHub Secrets como PROJECT_PATH)
          cd ${{ secrets.PROJECT_PATH }} || { echo "❌ No se pudo acceder al directorio del proyecto. Asegúrate de configurar PROJECT_PATH en GitHub Secrets."; exit 1; }
          
          # Sincronización indestructible y alineada exactamente con lo último de GitHub (soporta resets y pushes con force)
          git fetch origin
          git reset --hard origin/main
          
          # Instalar dependencias de Composer sin dependencias de desarrollo
          composer install --no-dev --optimize-autoloader
          
          # Ejecutar migraciones pendientes de forma segura
          php artisan migrate --force
          
          # Limpiar y optimizar la caché de Laravel
          php artisan optimize:clear
          php artisan optimize
          
          # Instalar dependencias de Node y compilar assets
          npm install
          npm run build
          
          echo "🚀 ¡Despliegue completado con éxito en tu Debian Trixie!"
