name: 🚀 Deploy SientiaMTX to Production

on:
  push:
    branches:
      - main

jobs:
  security-audit:
    name: 🛡️ Generar SBOM (SPDX)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🔍 Escanear Dependencias con Syft (SBOM)
        uses: anchore/sbom-action@v0
        with:
          format: 'spdx-json'
          output-file: 'sientiamtx-sbom.spdx.json'
          
      - name: 📦 Guardar Reporte SPDX como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: sientiamtx-sbom
          path: sientiamtx-sbom.spdx.json
          retention-days: 30

  deploy:
    name: ⚡ Local Self-Hosted Deployment
    needs: security-audit # Opcional: Asegura que la auditoría comienza antes/junto al deploy
    runs-on: self-hosted

    steps:
      - name: 🏁 Execute Local Deployment Commands
        run: |
          echo "🏁 Iniciando el despliegue automático local y seguro en Debian..."

          # Definir variables de entorno para Composer y NPM en el entorno de systemd
          export HOME=/root
          export COMPOSER_HOME=/root/.composer
          export COMPOSER_ALLOW_SUPERUSER=1
          
          # Acceder al directorio del proyecto (definido de forma segura en GitHub Secrets como PROJECT_PATH)
          cd ${{ secrets.PROJECT_PATH }} || { echo "❌ No se pudo acceder al directorio del proyecto. Asegúrate de configurar PROJECT_PATH en GitHub Secrets."; exit 1; }
          
          # Sincronización indestructible y alineada exactamente con lo último de GitHub (soporta resets y pushes con force)
          git fetch origin
          git reset --hard origin/main
          
          # Instalar dependencias de Composer sin dependencias de desarrollo
          composer install --no-dev --optimize-autoloader
          
          # Ejecutar migraciones pendientes de forma segura
          php artisan migrate --force
          
          # Limpiar y optimizar la caché de Laravel
          php artisan optimize:clear
          php artisan optimize
          
          # Instalar dependencias de Node y compilar assets
          npm install
          npm run build
          
          echo "🚀 ¡Despliegue completado con éxito en tu Debian Trixie!"
